<!DOCTYPE html>
<html>
<head>
    <title>Blog Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Blog Platform</h1>

    <div>
        <a href="login.html">
            <button>Login</button>
        </a>

        <a href="register.html">
            <button>Register</button>
        </a>
    </div>
</header>

<section class="blog-form">

    <h2>Create Blog Post</h2>

    <input
        type="text"
        id="title"
        placeholder="Blog Title"
    >

    <textarea
        id="content"
        placeholder="Write your blog..."
    ></textarea>

    <button onclick="addBlog()">
        Publish Blog
    </button>

</section>

<section id="blogContainer">

</section>

<script src="script.js"></script>

</body>
</html>
